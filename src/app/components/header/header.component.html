      <span><i class="fas fa-map-marker-alt"></i> Noida, Uttar Pradesh</span>
    </div>
    <div class="top-bar-right d-flex gap-4 align-items-center">
      <span><i class="fas fa-clock"></i> Mon - Sat 9.00 - 20.00</span>
      <span><i class="fas fa-envelope"></i> info&#64;careerboost.in</span>

  </div>
</div>
