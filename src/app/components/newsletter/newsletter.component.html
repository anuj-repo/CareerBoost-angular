<section class="newsletter-section" id="contact">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-5">
        <h4>Subscribe To Our Newsletter</h4>
        <p>Get free career tips, interview questions, and updates about upcoming batches delivered to your inbox.</p>
      </div>
      <div class="col-lg-7">
        <div class="newsletter-form">
          <label class="form-label">Your Email Address</label>
          <div class="input-group">
            <input type="email" class="form-control" placeholder="Enter email address..." [(ngModel)]="email">
            <button class="btn-subscribe" (click)="subscribe()" [disabled]="loading">
              {{ loading ? 'Subscribing...' : 'Subscribe' }}
            </button>
          </div>
          <div class="feedback-msg" *ngIf="message" [class.success]="success" [class.error]="!success">
            {{ message }}
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
